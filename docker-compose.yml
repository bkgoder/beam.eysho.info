services:
  beam-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: bkg-beam:local
    container_name: beam-server
    restart: unless-stopped
    command:
      - bkg-beam-server
      - --domain
      - ${BEAM_DOMAIN:-beam.eysho.info}
      - --port
      - ${BEAM_CONTROL_PORT:-8080}
      - --admin-port
      - ${BEAM_ADMIN_PORT:-8081}
    ports:
      - "${BEAM_CONTROL_BIND:-8080}:8080"
      - "${BEAM_ADMIN_BIND:-8081}:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  beam-router-ssh:
    build:
      context: ${BEAM_ROUTER_CONTEXT:-../router.beam.eysho.info}
      dockerfile: Dockerfile
    image: ${BEAM_ROUTER_IMAGE:-router-beam-eysho-info:local}
    container_name: beam-router-ssh
    restart: unless-stopped
    depends_on:
      beam-server:
        condition: service_healthy
    command:
      - --listen
      - 0.0.0.0:${BEAM_ROUTER_SSH_PORT:-2222}
      - --server
      - beam-server:8080
      - --tunnel-id
      - ${BEAM_ROUTER_SSH_TUNNEL_ID:-22-me_up-22}
    ports:
      - "${BEAM_ROUTER_SSH_BIND:-2222}:${BEAM_ROUTER_SSH_PORT:-2222}"

  beam-admin-ui:
    image: node:22-bookworm-slim
    container_name: beam-admin-ui
    restart: unless-stopped
    working_dir: /app
    environment:
      BEAM_API_BASE: ${BEAM_API_BASE:-http://beam-server:8081}
    command:
      - sh
      - -lc
      - |
        apt-get update \
          && apt-get install -y --no-install-recommends git curl ca-certificates pkg-config libssl-dev build-essential \
          && rm -rf /var/lib/apt/lists/* \
          && git clone --depth 1 https://github.com/bkgoder/admin.beam.eysho.info.git . \
          && curl https://sh.rustup.rs -sSf | sh -s -- -y \
          && . /root/.cargo/env \
          && cargo install dioxus-cli --version 0.7.9 --locked \
          && dx serve --addr 0.0.0.0 --port ${BEAM_ADMIN_UI_PORT:-3001}
    depends_on:
      beam-server:
        condition: service_healthy
    ports:
      - "${BEAM_ADMIN_UI_BIND:-3001}:${BEAM_ADMIN_UI_PORT:-3001}"

  beam-public-ui:
    image: node:22-bookworm-slim
    container_name: beam-public-ui
    restart: unless-stopped
    working_dir: /app
    environment:
      BEAM_API_BASE: ${BEAM_API_BASE:-http://beam-server:8081}
    command:
      - sh
      - -lc
      - |
        apt-get update \
          && apt-get install -y --no-install-recommends git curl ca-certificates pkg-config libssl-dev build-essential \
          && rm -rf /var/lib/apt/lists/* \
          && git clone --depth 1 https://github.com/bkgoder/public.beam.eysho.info.git . \
          && curl https://sh.rustup.rs -sSf | sh -s -- -y \
          && . /root/.cargo/env \
          && cargo install dioxus-cli --version 0.7.9 --locked \
          && dx serve --addr 0.0.0.0 --port ${BEAM_PUBLIC_UI_PORT:-3000}
    depends_on:
      beam-server:
        condition: service_healthy
    ports:
      - "${BEAM_PUBLIC_UI_BIND:-3000}:${BEAM_PUBLIC_UI_PORT:-3000}"
